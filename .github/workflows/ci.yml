name: CI Validation Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install pytest

      - name: Run tests
        run: |
          pytest test_add.py --junitxml=test-results.xml

      - name: Upload Test Evidence
        uses: actions/upload-artifact@v4
        with:
          name: test-evidence
          path: test-results.xml
